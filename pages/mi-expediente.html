<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net;
    connect-src 'self' https://script.google.com https://script.googleusercontent.com https://*.supabase.co;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' data:;
  ">
  <title>Mi expediente — DiversoLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/componentes.css">
  <style>
    .expediente-pagina {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .expediente-contenedor {
      max-width: 960px;
      margin: 0 auto;
      padding: var(--spacing-xl) var(--spacing-md);
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    /* --- Perfil card --- */

    .perfil-cabecera {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--spacing-md);
    }

    .perfil-nombre {
      font-family: var(--font-titulos);
      font-weight: 700;
      font-size: var(--text-xl);
      color: var(--color-violeta);
    }

    .perfil-badges {
      display: flex;
      gap: var(--spacing-xs);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .perfil-detalle {
      margin-top: var(--spacing-sm);
      font-size: var(--text-sm);
      color: var(--color-texto-muted);
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-md);
    }

    /* --- Section titles --- */

    .seccion-titulo {
      font-family: var(--font-titulos);
      font-weight: 700;
      font-size: var(--text-lg);
      color: var(--color-violeta);
      margin-bottom: var(--spacing-md);
    }

    /* --- Progreso stepper --- */

    .progreso-contenedor {
      display: flex;
      align-items: flex-start;
      padding: var(--spacing-sm) 0;
    }

    .progreso-paso {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 0 0 auto;
      min-width: 80px;
    }

    .progreso-circulo {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-titulos);
      font-weight: 700;
      font-size: var(--text-base);
      border: 2px solid var(--color-lavanda);
      background-color: white;
      color: var(--color-texto-muted);
    }

    .progreso-circulo-completo {
      background-color: var(--color-aqua);
      border-color: var(--color-aqua);
      color: var(--color-violeta);
    }

    .progreso-etiqueta {
      font-family: var(--font-datos);
      font-size: var(--text-xs);
      color: var(--color-texto-muted);
      text-align: center;
      margin-top: var(--spacing-xs);
      max-width: 90px;
    }

    .progreso-etiqueta-completa {
      color: var(--color-violeta);
    }

    .progreso-linea {
      flex: 1;
      height: 2px;
      background-color: var(--color-lavanda);
      margin-top: var(--spacing-lg);
      min-width: 24px;
    }

    .progreso-linea-completa {
      background-color: var(--color-aqua);
    }

    /* --- Tareas --- */

    .tarea-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--color-borde-tabla);
      gap: var(--spacing-md);
    }

    .tarea-item:last-child {
      border-bottom: none;
    }

    .tarea-info {
      flex: 1;
      min-width: 0;
    }

    .tarea-tipo {
      font-family: var(--font-titulos);
      font-weight: 700;
      font-size: var(--text-base);
      color: var(--color-violeta);
    }

    .tarea-detalle {
      font-size: var(--text-sm);
      color: var(--color-texto-muted);
      margin-top: var(--spacing-xs);
    }

    .tarea-meta {
      display: flex;
      gap: var(--spacing-sm);
      align-items: center;
      flex-wrap: wrap;
      margin-top: var(--spacing-xs);
    }

    .tarea-fecha {
      font-family: var(--font-datos);
      font-size: var(--text-xs);
      color: var(--color-texto-muted);
    }

    .btn-accion-firmar {
      background-color: var(--color-sol);
      color: var(--color-violeta);
    }

    /* --- Tables --- */

    .tabla-contenedor {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tabla-datos td { vertical-align: middle; }

    .btn-accion {
      border: none;
      border-radius: var(--radius-sm);
      padding: var(--spacing-xs) var(--spacing-sm);
      font-family: var(--font-datos);
      font-weight: 700;
      font-size: var(--text-xs);
      cursor: pointer;
      min-height: 32px;
      min-width: 32px;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .btn-accion:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* --- Empty + loading --- */

    .estado-vacio {
      text-align: center;
      padding: var(--spacing-2xl) var(--spacing-lg);
      color: var(--color-texto-muted);
      font-size: var(--text-base);
    }

    .cargando-texto {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--color-texto-muted);
    }

    /* --- Footer --- */

    .expediente-pie {
      background-color: var(--color-violeta);
      color: color-mix(in srgb, white 70%, transparent);
      padding: var(--spacing-lg) var(--spacing-xl);
      text-align: center;
      font-size: var(--text-xs);
    }

    .expediente-pie a { color: var(--color-sol); }

    @media (max-width: 480px) {
      .expediente-contenedor {
        padding: var(--spacing-md) var(--spacing-sm);
      }

      .perfil-cabecera {
        flex-direction: column;
      }

      .tarea-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .progreso-contenedor {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
</head>
<body class="expediente-pagina">
  <a href="#contenido-principal" class="saltar-contenido">Ir al contenido principal</a>
  <div class="marca-barra" aria-hidden="true"><span class="marca-barra-sol"></span><span class="marca-barra-aqua"></span><span class="marca-barra-coral"></span><span class="marca-barra-lavanda"></span></div>

  <header class="encabezado-app">
    <div class="encabezado-app-izquierda">
      <img src="../DiversoLab_Logo.gif" alt="DiversoLab" class="encabezado-logo">
      <span class="encabezado-titulo">Mi expediente</span>
    </div>
    <button type="button" id="btn-cerrar-sesion" class="encabezado-btn-salir">Cerrar sesión</button>
  </header>

  <main id="contenido-principal" class="expediente-contenedor">
    <section class="tarjeta" id="seccion-perfil" aria-label="Datos del perfil">
      <div id="contenido-perfil">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

    <section class="tarjeta" id="seccion-progreso" aria-label="Progreso del expediente">
      <h2 class="seccion-titulo">Progreso del expediente</h2>
      <div id="contenido-progreso">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

    <section class="tarjeta" id="seccion-tareas" aria-label="Tareas pendientes">
      <h2 class="seccion-titulo">Tareas pendientes</h2>
      <div id="contenido-tareas">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

    <section class="tarjeta" id="seccion-documentos" aria-label="Documentos">
      <h2 class="seccion-titulo">Documentos</h2>
      <div id="contenido-documentos">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

    <section class="tarjeta" id="seccion-consentimientos" aria-label="Consentimientos firmados">
      <h2 class="seccion-titulo">Consentimientos firmados</h2>
      <div id="contenido-consentimientos">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

  </main>

  <footer class="expediente-pie">
    <p>DiversoLab &mdash; Transformación desde el Potencial Humano Diverso</p>
    <p><a href="https://diversolab.org/politica" target="_blank" rel="noopener">Política de protección de datos</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/gas-client.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/labels.js"></script>
  <script src="../js/mi-expediente.js"></script>
</body>
</html>
