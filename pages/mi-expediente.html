<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
    connect-src 'self' https://script.google.com https://script.googleusercontent.com https://*.supabase.co;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' data:;
  ">
  <title>Mi expediente — DiversoLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/componentes.css">
  <style>
    .expediente-pagina {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .expediente-contenedor {
      max-width: 960px;
      margin: 0 auto;
      padding: var(--spacing-xl) var(--spacing-md);
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    /* --- Perfil card --- */

    .perfil-cabecera {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--spacing-md);
    }

    .perfil-nombre {
      font-family: var(--font-titulos);
      font-weight: 700;
      font-size: var(--text-xl);
      color: var(--color-violeta);
    }

    .perfil-badges {
      display: flex;
      gap: var(--spacing-xs);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .perfil-detalle {
      margin-top: var(--spacing-sm);
      font-size: var(--text-sm);
      color: var(--color-texto-muted);
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-md);
    }

    /* --- Section titles --- */

    .seccion-titulo {
      font-family: var(--font-titulos);
      font-weight: 700;
      font-size: var(--text-lg);
      color: var(--color-violeta);
      margin-bottom: var(--spacing-md);
    }

    /* --- Progreso stepper --- */

    .progreso-contenedor {
      display: flex;
      align-items: flex-start;
      padding: var(--spacing-sm) 0;
    }

    .progreso-paso {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 0 0 auto;
      min-width: 80px;
    }

    .progreso-circulo {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-titulos);
      font-weight: 700;
      font-size: var(--text-base);
      border: 2px solid var(--color-lavanda);
      background-color: white;
      color: var(--color-texto-muted);
    }

    .progreso-circulo-completo {
      background-color: var(--color-aqua);
      border-color: var(--color-aqua);
      color: var(--color-violeta);
    }

    .progreso-etiqueta {
      font-family: var(--font-datos);
      font-size: var(--text-xs);
      color: var(--color-texto-muted);
      text-align: center;
      margin-top: var(--spacing-xs);
      max-width: 90px;
    }

    .progreso-etiqueta-completa {
      color: var(--color-violeta);
    }

    .progreso-linea {
      flex: 1;
      height: 2px;
      background-color: var(--color-lavanda);
      margin-top: var(--spacing-lg);
      min-width: 24px;
    }

    .progreso-linea-completa {
      background-color: var(--color-aqua);
    }

    /* --- Tareas --- */

    .tarea-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--color-borde-tabla);
      gap: var(--spacing-md);
    }

    .tarea-item:last-child {
      border-bottom: none;
    }

    .tarea-info {
      flex: 1;
      min-width: 0;
    }

    .tarea-tipo {
      font-family: var(--font-titulos);
      font-weight: 700;
      font-size: var(--text-base);
      color: var(--color-violeta);
    }

    .tarea-detalle {
      font-size: var(--text-sm);
      color: var(--color-texto-muted);
      margin-top: var(--spacing-xs);
    }

    .tarea-meta {
      display: flex;
      gap: var(--spacing-sm);
      align-items: center;
      flex-wrap: wrap;
      margin-top: var(--spacing-xs);
    }

    .tarea-fecha {
      font-family: var(--font-datos);
      font-size: var(--text-xs);
      color: var(--color-texto-muted);
    }

    .btn-accion-firmar {
      background-color: var(--color-sol);
      color: var(--color-violeta);
    }

    /* --- Tables --- */

    .tabla-contenedor {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tabla-datos td { vertical-align: middle; }

    .btn-accion {
      border: none;
      border-radius: var(--radius-sm);
      padding: var(--spacing-xs) var(--spacing-sm);
      font-family: var(--font-datos);
      font-weight: 700;
      font-size: var(--text-xs);
      cursor: pointer;
      min-height: 32px;
      min-width: 32px;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .btn-accion:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* --- Empty + loading --- */

    .estado-vacio {
      text-align: center;
      padding: var(--spacing-2xl) var(--spacing-lg);
      color: var(--color-texto-muted);
      font-size: var(--text-base);
    }

    .cargando-texto {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--color-texto-muted);
    }

    /* --- Footer --- */

    .expediente-pie {
      background-color: var(--color-violeta);
      color: color-mix(in srgb, white 70%, transparent);
      padding: var(--spacing-lg) var(--spacing-xl);
      text-align: center;
      font-size: var(--text-xs);
    }

    .expediente-pie a { color: var(--color-sol); }

    @media (max-width: 480px) {
      .expediente-contenedor {
        padding: var(--spacing-md) var(--spacing-sm);
      }

      .perfil-cabecera {
        flex-direction: column;
      }

      .tarea-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .progreso-contenedor {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
</head>
<body class="expediente-pagina">
  <a href="#contenido-principal" class="saltar-contenido">Ir al contenido principal</a>
  <div class="marca-barra" aria-hidden="true"><span class="marca-barra-sol"></span><span class="marca-barra-aqua"></span><span class="marca-barra-coral"></span><span class="marca-barra-lavanda"></span><span class="marca-barra-violeta"></span></div>

  <header class="encabezado-app">
    <div class="encabezado-app-izquierda">
      <img src="../DiversoLab_Logo.gif" alt="DiversoLab" class="encabezado-logo">
      <span class="encabezado-titulo">Mi expediente</span>
    </div>
    <button type="button" id="btn-cerrar-sesion" class="encabezado-btn-salir">Cerrar sesión</button>
  </header>

  <main id="contenido-principal" class="expediente-contenedor">
    <p id="encabezado-subtitulo" class="cargando-texto" style="font-size:var(--text-sm);color:var(--color-texto-muted);margin-bottom:0">Cargando...</p>

    <section class="tarjeta" id="seccion-perfil" aria-label="Datos del perfil">
      <div id="contenido-perfil">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

    <section class="tarjeta" id="seccion-progreso" aria-label="Progreso del expediente">
      <h2 class="seccion-titulo">Progreso del expediente</h2>
      <div id="contenido-progreso">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

    <section class="tarjeta" id="seccion-tareas" aria-label="Tareas pendientes">
      <h2 class="seccion-titulo">Tareas pendientes</h2>
      <div id="contenido-tareas">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

    <section class="tarjeta" id="seccion-documentos" aria-label="Documentos">
      <h2 class="seccion-titulo">Documentos</h2>
      <div id="contenido-documentos">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

    <section class="tarjeta" id="seccion-consentimientos" aria-label="Consentimientos firmados">
      <h2 class="seccion-titulo">Consentimientos firmados</h2>
      <div id="contenido-consentimientos">
        <p class="cargando-texto" aria-busy="true">Cargando...</p>
      </div>
    </section>

  </main>

  <footer class="expediente-pie">
    <p>DiversoLab &mdash; Transformación desde el Potencial Humano Diverso</p>
    <p><a href="https://diversolab.org/politica" target="_blank" rel="noopener">Politica de proteccion de datos</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/gas-client.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    // --- Constantes ---

    var LABELS_TIPOS = {
      beneficiario: 'Beneficiario',
      aliado: 'Aliado',
      contratista: 'Contratista',
      proveedor: 'Proveedor'
    };

    var LABELS_ESTADOS_PERFIL = {
      pendiente: 'Pendiente',
      activo: 'Activo',
      suspendido: 'Suspendido',
      inactivo: 'Inactivo'
    };

    var LABELS_ESTADOS_DOC = {
      pendiente: 'Pendiente',
      aprobado: 'Aprobado',
      rechazado: 'Rechazado'
    };

    var LABELS_CONSENTIMIENTOS = {
      C1: 'Datos basicos',
      C2: 'Identificacion',
      C3: 'Datos sensibles',
      C4: 'Analitica/IA',
      C5: 'Comunicaciones',
      C6: 'Imagen/voz',
      C7: 'Seguimiento'
    };

    var LABELS_TIPO_TAREA = {
      consentimiento: 'Firma de consentimientos',
      documento: 'Subir documento',
      revision: 'Revision pendiente'
    };

    // --- Estado ---

    var estado = {
      sesion: null,
      jwt: null,
      perfil: null,
      tareas: [],
      documentos: [],
      consentimientos: []
    };

    // --- Inicializacion ---

    document.addEventListener('DOMContentLoaded', function() {
      cargar_pagina();
    });

    async function cargar_pagina() {
      estado.sesion = await verificar_sesion();
      if (!estado.sesion) return;
      estado.jwt = estado.sesion.access_token;

      try {
        var perfiles = await supabase_fetch(
          '/profiles?auth_user_id=eq.' + estado.sesion.user.id +
          '&select=id,profile_type,nombre,apellido,razon_social,tipo_documento,numero_documento,email_principal,estado_perfil&limit=1',
          estado.jwt
        );

        if (!perfiles || perfiles.length === 0) {
          mostrar_error('No se encontro tu perfil.');
          return;
        }

        estado.perfil = perfiles[0];

        if (estado.perfil.profile_type === 'miembro') {
          window.location.href = 'dashboard.html';
          return;
        }

        poblar_encabezado();
        poblar_perfil();

        var resultados = await Promise.all([
          supabase_fetch(
            '/tareas?perfil_id=eq.' + estado.perfil.id +
            '&estado=in.(pendiente,en_curso)&select=id,tipo_tarea,detalle,estado,es_urgente,fecha_limite' +
            '&order=es_urgente.desc,fecha_limite.asc&limit=50',
            estado.jwt
          ).catch(function() { return []; }),
          supabase_fetch(
            '/catalogo_docs?perfil_id=eq.' + estado.perfil.id +
            '&select=tipo_documento,categoria,estado,fecha_subida' +
            '&order=fecha_subida.desc.nullsfirst&limit=50',
            estado.jwt
          ).catch(function() { return []; }),
          supabase_fetch(
            '/consentimientos?perfil_id=eq.' + estado.perfil.id +
            '&aceptado=eq.true&select=codigo,folio,created_at' +
            '&order=created_at.desc',
            estado.jwt
          ).catch(function() { return []; })
        ]);

        estado.tareas = resultados[0] || [];
        estado.documentos = resultados[1] || [];
        estado.consentimientos = resultados[2] || [];

        poblar_progreso();
        poblar_tareas();
        poblar_documentos();
        poblar_consentimientos();

      } catch (error) {
        mostrar_error(mensaje_usuario(error.message));
      }

      vincular_eventos();
    }

    function vincular_eventos() {
      document.getElementById('btn-cerrar-sesion').addEventListener('click', cerrar_sesion);
      document.getElementById('contenido-tareas').addEventListener('click', al_click_tarea);
    }

    // --- Encabezado ---

    function poblar_encabezado() {
      var nombre = estado.perfil.razon_social || ((estado.perfil.nombre || '') + ' ' + (estado.perfil.apellido || '')).trim() || '';
      document.getElementById('encabezado-subtitulo').textContent = nombre;
    }

    // --- Perfil ---

    function poblar_perfil() {
      var p = estado.perfil;
      var nombre = p.razon_social || ((p.nombre || '') + ' ' + (p.apellido || '')).trim() || '—';

      var html = '<div class="perfil-cabecera">' +
        '<div>' +
          '<div class="perfil-nombre">' + escapar_html(nombre) + '</div>' +
          '<div class="perfil-detalle">' +
            '<span>' + escapar_html(p.tipo_documento + ' ' + p.numero_documento) + '</span>' +
            '<span>' + escapar_html(p.email_principal) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="perfil-badges">' +
          badge_tipo(p.profile_type) +
          badge_estado_perfil(p.estado_perfil) +
        '</div>' +
      '</div>';

      document.getElementById('contenido-perfil').innerHTML = html;
    }

    // --- Progreso ---

    function poblar_progreso() {
      var tiene_consentimientos = estado.consentimientos.length > 0;

      var pasos = [
        { etiqueta: 'Registro', completo: true },
        { etiqueta: 'Consentimientos', completo: tiene_consentimientos },
        { etiqueta: 'Ubicacion', completo: false },
        { etiqueta: 'Documentacion', completo: false }
      ];

      var html = '<div class="progreso-contenedor">';

      for (var i = 0; i < pasos.length; i++) {
        var paso = pasos[i];
        var clase_circulo = 'progreso-circulo';
        var contenido = String(i + 1);
        var clase_etiqueta = 'progreso-etiqueta';

        if (paso.completo) {
          clase_circulo += ' progreso-circulo-completo';
          contenido = '✓';
          clase_etiqueta += ' progreso-etiqueta-completa';
        }

        html += '<div class="progreso-paso">' +
          '<div class="' + clase_circulo + '" aria-label="Paso ' + (i + 1) + ': ' + paso.etiqueta + (paso.completo ? ' completado' : ' pendiente') + '">' + contenido + '</div>' +
          '<div class="' + clase_etiqueta + '">' + escapar_html(paso.etiqueta) + '</div>' +
        '</div>';

        if (i < pasos.length - 1) {
          var clase_linea = 'progreso-linea';
          if (paso.completo) clase_linea += ' progreso-linea-completa';
          html += '<div class="' + clase_linea + '"></div>';
        }
      }

      html += '</div>';
      document.getElementById('contenido-progreso').innerHTML = html;
    }

    // --- Tareas ---

    function poblar_tareas() {
      var contenedor = document.getElementById('contenido-tareas');

      if (estado.tareas.length === 0) {
        contenedor.innerHTML = '<p class="estado-vacio">No tienes tareas pendientes.</p>';
        return;
      }

      var html = '';
      for (var i = 0; i < estado.tareas.length; i++) {
        var t = estado.tareas[i];
        var es_firma = t.tipo_tarea === 'consentimiento';
        var detalle_texto = extraer_detalle(t.detalle);

        html += '<div class="tarea-item">' +
          '<div class="tarea-info">' +
            '<div class="tarea-tipo">' + escapar_html(LABELS_TIPO_TAREA[t.tipo_tarea] || t.tipo_tarea) + '</div>' +
            (detalle_texto ? '<div class="tarea-detalle">' + escapar_html(detalle_texto) + '</div>' : '') +
            '<div class="tarea-meta">' +
              (t.es_urgente ? '<span class="insignia insignia-alerta">Urgente</span>' : '') +
              badge_estado_tarea(t.estado) +
              (t.fecha_limite ? '<span class="tarea-fecha">Limite: ' + formatear_fecha_corta(t.fecha_limite) + '</span>' : '') +
            '</div>' +
          '</div>' +
          (es_firma ? '<button type="button" class="btn-accion btn-accion-firmar" data-accion="firmar" data-tarea-id="' + t.id + '">Firmar</button>' : '') +
        '</div>';
      }

      contenedor.innerHTML = html;
    }

    function al_click_tarea(e) {
      var btn = e.target.closest('[data-accion="firmar"]');
      if (!btn) return;
      window.location.href = 'firma.html?token=' + btn.dataset.tareaId;
    }

    // --- Documentos ---

    function poblar_documentos() {
      var contenedor = document.getElementById('contenido-documentos');

      if (estado.documentos.length === 0) {
        contenedor.innerHTML = '<p class="estado-vacio">No tienes documentos registrados.</p>';
        return;
      }

      var html = '<div class="tabla-contenedor"><table class="tabla-datos"><thead><tr>' +
        '<th scope="col">Tipo</th>' +
        '<th scope="col">Categoria</th>' +
        '<th scope="col">Estado</th>' +
        '<th scope="col">Fecha</th>' +
        '</tr></thead><tbody>';

      for (var i = 0; i < estado.documentos.length; i++) {
        var d = estado.documentos[i];
        html += '<tr>' +
          '<td>' + escapar_html(d.tipo_documento) + '</td>' +
          '<td>' + escapar_html(d.categoria || '—') + '</td>' +
          '<td>' + badge_estado_doc(d.estado) + '</td>' +
          '<td>' + (d.fecha_subida ? formatear_fecha_corta(d.fecha_subida) : '—') + '</td>' +
        '</tr>';
      }

      html += '</tbody></table></div>';
      contenedor.innerHTML = html;
    }

    // --- Consentimientos ---

    function poblar_consentimientos() {
      var contenedor = document.getElementById('contenido-consentimientos');

      if (estado.consentimientos.length === 0) {
        contenedor.innerHTML = '<p class="estado-vacio">No tienes consentimientos firmados.</p>';
        return;
      }

      var html = '<div class="tabla-contenedor"><table class="tabla-datos"><thead><tr>' +
        '<th scope="col">Consentimiento</th>' +
        '<th scope="col">Fecha</th>' +
        '<th scope="col">Folio</th>' +
        '</tr></thead><tbody>';

      for (var i = 0; i < estado.consentimientos.length; i++) {
        var c = estado.consentimientos[i];
        var label = LABELS_CONSENTIMIENTOS[c.codigo] || c.codigo;
        html += '<tr>' +
          '<td>' + escapar_html(c.codigo + ' — ' + label) + '</td>' +
          '<td>' + formatear_fecha(c.created_at) + '</td>' +
          '<td><span class="insignia insignia-neutra">' + escapar_html(c.folio) + '</span></td>' +
        '</tr>';
      }

      html += '</tbody></table></div>';
      contenedor.innerHTML = html;
    }

    // --- Helpers: badges ---

    function badge_tipo(tipo) {
      var label = LABELS_TIPOS[tipo] || tipo;
      var clase = 'insignia-neutra';
      if (tipo === 'beneficiario' || tipo === 'contratista') clase = 'insignia-progreso';
      return '<span class="insignia ' + clase + '">' + escapar_html(label) + '</span>';
    }

    function badge_estado_perfil(est) {
      var label = LABELS_ESTADOS_PERFIL[est] || est;
      var clase = 'insignia-neutra';
      if (est === 'activo') clase = 'insignia-exito';
      if (est === 'pendiente') clase = 'insignia-progreso';
      if (est === 'suspendido') clase = 'insignia-alerta';
      return '<span class="insignia ' + clase + '">' + escapar_html(label) + '</span>';
    }

    function badge_estado_tarea(est) {
      var labels = { pendiente: 'Pendiente', en_curso: 'En curso' };
      var label = labels[est] || est;
      var clase = est === 'en_curso' ? 'insignia-progreso' : 'insignia-alerta';
      return '<span class="insignia ' + clase + '">' + escapar_html(label) + '</span>';
    }

    function badge_estado_doc(est) {
      var label = LABELS_ESTADOS_DOC[est] || est;
      var clase = 'insignia-neutra';
      if (est === 'aprobado') clase = 'insignia-exito';
      if (est === 'pendiente') clase = 'insignia-progreso';
      if (est === 'rechazado') clase = 'insignia-alerta';
      return '<span class="insignia ' + clase + '">' + escapar_html(label) + '</span>';
    }

    // --- Helpers: formato ---

    function extraer_detalle(detalle) {
      if (!detalle) return '';
      try {
        var datos = JSON.parse(detalle);
        if (datos.programa) return datos.programa;
      } catch (e) {}
      return detalle;
    }

    function formatear_fecha_corta(fecha_str) {
      if (!fecha_str) return '—';
      var fecha = new Date(fecha_str);
      return fecha.toLocaleDateString('es-CO', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }
  </script>
</body>
</html>
