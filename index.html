<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self';">
  <title>DiversoLab Conecta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/componentes.css">
  <style>
    .entrada-pagina {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-crema);
      padding: var(--spacing-lg);
    }

    .entrada-contenido {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .entrada-logo {
      max-width: 280px;
      margin: 0 auto var(--spacing-md);
      display: block;
    }

    .entrada-tagline {
      font-family: var(--font-cuerpo);
      font-weight: 700;
      font-size: var(--text-lg);
      color: var(--color-texto-muted);
      margin: 0 0 var(--spacing-xl);
    }

    .entrada-acronimo {
      font-family: var(--font-titulos);
      font-weight: 900;
      font-size: 3.5rem;
      letter-spacing: 0.05em;
      margin: 0 0 var(--spacing-sm);
    }

    .entrada-acronimo-separador {
      color: var(--color-lavanda);
      margin: 0 2px;
    }

    .entrada-subtitulo {
      font-family: var(--font-cuerpo);
      font-weight: 700;
      font-size: var(--text-base);
      color: var(--color-violeta);
      margin: 0 0 var(--spacing-xl);
    }

    .entrada-separador {
      border: none;
      border-top: 1px solid var(--color-lavanda);
      max-width: 200px;
      margin: var(--spacing-xl) auto;
    }

    .entrada-acciones {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      max-width: 320px;
      margin: 0 auto;
    }

    .entrada-acciones .btn-primario,
    .entrada-acciones .btn-secundario {
      width: 100%;
    }

    .entrada-footer {
      font-family: var(--font-datos);
      font-size: var(--text-sm);
      color: color-mix(in srgb, var(--color-violeta) 50%, transparent);
      margin-top: var(--spacing-2xl);
    }
  </style>
</head>
<body class="entrada-pagina">
  <a href="#contenido-principal" class="saltar-contenido">Ir al contenido principal</a>
  <div class="marca-barra" aria-hidden="true"><span class="marca-barra-sol"></span><span class="marca-barra-aqua"></span><span class="marca-barra-coral"></span><span class="marca-barra-lavanda"></span></div>

  <main id="contenido-principal" class="entrada-contenido" role="main">
    <img src="DiversoLab_Logo.gif" alt="DiversoLab" class="entrada-logo">

    <p class="entrada-tagline">Transformación desde el Potencial Humano Diverso</p>

    <p class="entrada-acronimo" aria-label="CONECTA">
      <span style="color: var(--color-sol);">C</span><span class="entrada-acronimo-separador">·</span><span style="color: var(--color-aqua);">O</span><span class="entrada-acronimo-separador">·</span><span style="color: var(--color-coral);">N</span><span class="entrada-acronimo-separador">·</span><span style="color: var(--color-lavanda);">E</span><span class="entrada-acronimo-separador">·</span><span style="color: var(--color-violeta);">C</span><span class="entrada-acronimo-separador">·</span><span style="color: var(--color-sol);">T</span><span class="entrada-acronimo-separador">·</span><span style="color: var(--color-aqua);">A</span>
    </p>

    <p class="entrada-subtitulo">centro de observación, evaluación y coordinación para la transformación accesible</p>

    <hr class="entrada-separador" aria-hidden="true">

    <nav class="entrada-acciones" aria-label="Acceso a la plataforma">
      <a href="pages/login.html" class="btn-primario">Iniciar sesión</a>
      <a href="pages/registro.html" class="btn-secundario">Registrarse</a>
    </nav>

    <p class="entrada-footer">DiversoLab · diversolab.org · info@diversolab.org</p>
  </main>
</body>
</html>
